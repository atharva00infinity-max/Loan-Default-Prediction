<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Default Prediction System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>🏦 Loan Default Prediction</h1>

        <p class="subtitle">
            Machine Learning Based Credit Risk Assessment
        </p>

<form action="{{ url_for('predict') }}" method="POST">

    <div class="form-group">
    <label>Age</label>
    <input type="number" step="any" name="Age" placeholder="Age" required>
</div>

    <div class="form-group">
    <label>Income</label>
    <input type="number" step="any" name="Income" placeholder="Income" required>
</div>


    <div class="form-group">
    <label>Loan Amount</label>
    <input type="number" step="any" name="LoanAmount" placeholder="Loan Amount" required>
</div>


    <div class="form-group">
    <label>Credit Score</label>
    <input type="number" step="any" name="CreditScore" placeholder="Credit Score" required>
</div>


    <div class="form-group">
    <label>Months Employed</label>
    <input type="number" step="any" name="MonthsEmployed" placeholder="Months Employed" required>
</div>

    <div class="form-group">
    <label>Number of Credit Lines</label>
    <input type="number" step="any" name="NumCreditLines" placeholder="Number of Credit Lines" required>
</div>
    <div class="form-group">
    <label>Interest Rate</label>
    <input type="number" step="any" name="InterestRate" placeholder="Interest Rate" required>
</div>

    <div class="form-group">
    <label>Loan Term</label>
    <input type="number" step="any" name="LoanTerm" placeholder="Loan Term" required>
</div>
    

    

    <div class="form-group">
    <label>Education</label>
    <select name="Education" required>
        <option value="High School">High School</option>
        <option value="Bachelor's">Bachelor's</option>
        <option value="Master's">Master's</option>
        <option value="PhD">PhD</option>
    </select>
</div>

    

    <div class="form-group">
    <label>Employment Type</label>
    <select name="EmploymentType" required>
        <option value="Full-time">Full-time</option>
        <option value="Part-time">Part-time</option>
        <option value="Self-employed">Self-employed</option>
        <option value="Unemployed">Unemployed</option>
    </select>
</div>

   
    <div class="form-group">
    <label>Marital Status</label>
    <select name="MaritalStatus" required>
        <option value="Single">Single</option>
        <option value="Married">Married</option>
        <option value="Divorced">Divorced</option>
    </select>
</div>

   
    <div class="form-group">
    <label>Has Mortgage</label>
    <select name="HasMortgage" required>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select>
</div>

    
    <div class="form-group">
    <label>Has Dependents</label>
    <select name="HasDependents" required>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select>
</div>

    
    <div class="form-group">
    <label>Loan Purpose</label>
    <select name="LoanPurpose" required>
        <option value="Auto">Auto</option>
        <option value="Business">Business</option>
        <option value="Education">Education</option>
        <option value="Home">Home</option>
        <option value="Other">Other</option>
    </select>
</div>

    

    <div class="form-group">
    <label>Has Co-Signer</label>
    <select name="HasCoSigner" required>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select>
</div>

    <br><br>

    <button type="submit">Predict Loan Default</button>

</form>

{% if prediction is not none %}
    <h3 style="text-align:center;">
        Default Prediction: <span id="prediction">{{ "YES" if prediction==1 else "NO" }}</span> <br>
        Probability: <span id="probability">{{ probability }}</span>
    </h3>
{% endif %}
</div>
</div>
</body>
</html>
